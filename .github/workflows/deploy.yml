name: Deploy VK Bot

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: TOKEN, ADMIN_ID, SALON_NAME
          script: |
            if [ ! -d "$HOME/bot_admin_vk/.git" ]; then
              rm -rf "$HOME/bot_admin_vk"
              git clone https://github.com{{ github.repository }}.git "$HOME/bot_admin_vk"
            fi
            
            cd "$HOME/bot_admin_vk"
            git fetch origin master
            git reset --hard origin master
            
            # 1. СОЗДАЕМ ОТДЕЛЬНУЮ ПАПКУ ДЛЯ БАЗЫ И ДАЕМ ПРАВА
            # Это исключит ошибку "unable to open database", так как SQLite сможет создавать lock-файлы
            mkdir -p data
            touch data/optica.db
            chmod -R 777 data  # Даем полные права на папку и файл внутри

            docker build -t vk_bot_image .
            
            docker stop vk_bot_container || true
            docker rm vk_bot_container || true
            
            # 2. МОНТИРУЕМ ПАПКУ ЦЕЛИКОМ
            # Внутри контейнера файл будет доступен по пути /app/data/optica.db
            docker run -d \
              --name vk_bot_container \
              --restart always \
              -e TOKEN="$TOKEN" \
              -e ADMIN_ID="$ADMIN_ID" \
              -e SALON_NAME="$SALON_NAME" \
              -v "$HOME/bot_admin_vk/data:/app/data" \
              vk_bot_image

        env:
          TOKEN: ${{ secrets.TOKEN }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
          SALON_NAME: ${{ secrets.SALON_NAME }}
