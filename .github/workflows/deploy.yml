name: Deploy VK Bot

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          # 1. Список переменных, которые SSH-планшет "прокинет" на сервер
          envs: TOKEN, ADMIN_ID, SALON_NAME
          script: |
            # Заходим в папку или клонируем, если её нет
            if [ ! -d "~/bot_admin_vk/.git" ]; then
              rm -rf ~/bot_admin_vk
              git clone https://github.com{{ github.repository }}.git ~/bot_admin_vk
            fi
            
            cd ~/bot_admin_vk
            git fetch origin master
            git reset --hard origin master
            
            # Исправляем проблему с базой данных (файл, а не папка)
            if [ -d "optica.db" ]; then
              rm -rf optica.db
            fi
            touch optica.db
            chmod 666 optica.db

            # Собираем новый образ
            docker build -t vk_bot_image .
            
            # Удаляем старый контейнер, если он есть
            docker stop vk_bot_container || true
            docker rm vk_bot_container || true
            
            # Запускаем контейнер. 
            # ВАЖНО: используем $TOKEN (из envs), а не ${{ secrets.TOKEN }} напрямую
            docker run -d \
              --name vk_bot_container \
              --restart always \
              -e TOKEN="$TOKEN" \
              -e ADMIN_ID="$ADMIN_ID" \
              -e SALON_NAME="$SALON_NAME" \
              -v ~/bot_admin_vk/optica.db:/app/optica.db \
              vk_bot_image

        # 2. Здесь мы сопоставляем Секреты Гитхаба с переменными окружения Action
        env:
          TOKEN: ${{ secrets.TOKEN }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
          SALON_NAME: ${{ secrets.SALON_NAME }}
