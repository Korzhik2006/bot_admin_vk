name: Deploy VK Bot

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          # Прокидываем переменные из блока env (ниже) в скрипт
          envs: TOKEN, ADMIN_ID, SALON_NAME
          script: |
            # 1. Подготовка папки проекта
            if [ ! -d "$HOME/bot_admin_vk/.git" ]; then
              rm -rf "$HOME/bot_admin_vk"
              git clone https://github.com{{ github.repository }}.git "$HOME/bot_admin_vk"
            fi
            
            cd "$HOME/bot_admin_vk"
            git fetch origin master
            git reset --hard origin master
            
            # 2. Жёсткое исправление проблемы с sqlite3 (убиваем папки, создаем файл)
            if [ -d "optica.db" ]; then
              rm -rf optica.db
            fi
            touch optica.db
            chmod 666 optica.db

            # 3. Сборка образа
            docker build -t vk_bot_image .
            
            # 4. Перезапуск контейнера
            docker stop vk_bot_container || true
            docker rm vk_bot_container || true
            
            # 5. Запуск с монтированием базы по полному пути
            # Используем только TOKEN, как ты и просил
            docker run -d \
              --name vk_bot_container \
              --restart always \
              -e TOKEN="$TOKEN" \
              -e ADMIN_ID="$ADMIN_ID" \
              -e SALON_NAME="$SALON_NAME" \
              -v "$HOME/bot_admin_vk/optica.db:/app/optica.db" \
              vk_bot_image

        # Сопоставляем секреты GitHub с переменными окружения
        env:
          TOKEN: ${{ secrets.TOKEN }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
          SALON_NAME: ${{ secrets.SALON_NAME }}
